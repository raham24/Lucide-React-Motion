name: Release PR

# Opens a "Version Packages" PR whenever changesets land on main.
# Publishing happens manually from a maintainer's machine:
#   pnpm build
#   cd packages/lucide-react-motion
#   pnpm publish --access public --provenance --otp <code>
# Switch back to automated publish (and re-add the publish: step) once
# the package is configured with npm Trusted Publishing.

on:
  push:
    branches: [main]

concurrency:
  group: release-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-pr:
    name: Open version PR
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Open or update Version Packages PR
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
